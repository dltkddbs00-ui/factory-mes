<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공장 수불 관리</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:13px;color:#1e293b;background:#f1f5f9}

/* ── 로그인/회원가입 ── */
#auth-screen{position:fixed;inset:0;background:#141c2e;display:flex;align-items:center;justify-content:center;z-index:9999}
#auth-screen.gone{display:none}
.auth-wrap{display:flex;flex-direction:column;align-items:center;gap:0}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-logo .ico{font-size:42px;display:block;margin-bottom:8px}
.auth-logo h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:2px}
.auth-logo p{font-size:12px;color:#64748b}
.auth-card{background:#fff;border-radius:16px;width:400px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.auth-tabs{display:flex}
.auth-tab{flex:1;padding:13px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.auth-tab.on{background:#fff;color:#1e293b;border-bottom:2px solid #3b7bff}
.auth-tab.off{background:#f8fafc;color:#8492a6;border-bottom:2px solid #e4e9f0}
.auth-body{padding:24px 26px 26px}
.lf{margin-bottom:12px}
.lf label{font-size:11px;color:#8492a6;display:block;margin-bottom:4px;font-weight:600}
.lf input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #e4e9f0;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.lf input:focus{border-color:#3b7bff}
.lf-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.auth-err{font-size:12px;color:#ef4444;min-height:16px;margin-bottom:8px}
.auth-btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.auth-btn-blue{background:#3b7bff;color:#fff}
.auth-btn-blue:hover{background:#2563eb}
.auth-btn-dark{background:#1e293b;color:#fff}
.auth-btn-dark:hover{background:#334155}
.auth-note{font-size:11px;color:#8492a6;text-align:center;margin-top:13px;line-height:1.7;padding:10px;background:#f8fafc;border-radius:8px}
.pending-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:14px;padding:28px 28px 24px;text-align:center;width:400px}
.pending-box .ico{font-size:36px;margin-bottom:10px}
.pending-box h3{font-size:15px;font-weight:700;color:#92400e;margin-bottom:8px}
.pending-box p{font-size:12px;color:#78350f;line-height:1.7;margin-bottom:16px}
.pending-box .back{background:none;border:1.5px solid #fcd34d;border-radius:7px;padding:8px 20px;font-size:12px;color:#92400e;cursor:pointer;font-family:inherit;font-weight:600}

/* ── 앱 레이아웃 ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:210px;background:#1e2535;display:flex;flex-direction:column;flex-shrink:0}
#sidebar .logo{padding:22px 18px 14px}
#sidebar .logo .sub{font-size:9px;color:#5f7390;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
#sidebar .logo .title{font-size:17px;font-weight:700;color:#fff}
#sidebar nav{flex:1;padding:4px 10px}
#sidebar nav button{width:100%;text-align:left;display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;margin-bottom:2px;border:none;background:transparent;color:#8492a6;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
#sidebar nav button:hover{background:#2d3650;color:#cbd5e1}
#sidebar nav button.active{background:#2d3650;color:#fff;font-weight:600}
#sidebar-user{padding:14px 18px;border-top:1px solid #2d3650;font-size:11px;color:#5f7390}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #e4e9f0;height:52px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar .page-title{font-size:15px;font-weight:600}
#topbar .page-sub{font-size:11px;color:#8492a6;margin-left:8px}
#topbar .btns{display:flex;gap:7px;align-items:center}
#content{flex:1;overflow-y:auto;padding:20px 22px}

/* ── 버튼 ── */
.btn{border:none;border-radius:6px;padding:8px 15px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:#3b7bff;color:#fff}.btn-blue:hover{background:#2563eb}
.btn-green{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}.btn-green:hover{background:#dcfce7}
.btn-white{background:#fff;color:#8492a6;border:1px solid #e4e9f0}.btn-white:hover{background:#f8fafc}
.btn-save{background:#10b981;color:#fff}.btn-save:hover{background:#059669}
.btn-print{background:#f8fafc;color:#374151;border:1px solid #e4e9f0}.btn-print:hover{background:#f1f5f9}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-warn{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.btn-danger{background:#fef2f2;color:#ef4444;border:1px solid #fecaca}

/* ── 카드 ── */
.card{background:#fff;border:1px solid #e4e9f0;border-radius:10px}
.card-pad{padding:18px 20px}

/* ── 통계 카드 ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.stat-card{background:#fff;border:1px solid #e4e9f0;border-radius:10px;padding:15px 17px}
.stat-card .label{font-size:10px;color:#8492a6;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat-card .value{font-size:25px;font-weight:700;font-family:'Courier New',monospace}
.stat-card .sub{font-size:11px;color:#8492a6;margin-top:3px}

/* ── 뱃지 ── */
.pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
.pill-원자재{background:#dbeafe;color:#1d4ed8}
.pill-부자재{background:#e0e7ff;color:#4338ca}
.pill-원육{background:#fce7f3;color:#be185d}
.pill-제품{background:#dcfce7;color:#166534}
.pill-반제품{background:#fef9c3;color:#a16207}
.pill-소모품{background:#f3e8ff;color:#7e22ce}
.pill-부품{background:#ffe4e6;color:#be123c}
.pill-입고{background:#dbeafe;color:#1d4ed8}
.pill-출고{background:#fce7f3;color:#be185d}
.pill-폐기{background:#fef2f2;color:#dc2626}
.pill-재고조정{background:#fef9c3;color:#a16207}
.pill-사용{background:#dcfce7;color:#166534}
.pill-비사용{background:#f1f5f9;color:#8492a6}

/* ── 토글 ── */
.toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.toggle input{display:none}
.toggle-track{width:38px;height:21px;border-radius:99px;background:#d1d5db;position:relative;transition:background .2s;flex-shrink:0}
.toggle input:checked+.toggle-track{background:#10b981}
.toggle-thumb{position:absolute;top:2.5px;left:2.5px;width:16px;height:16px;border-radius:99px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s}
.toggle input:checked+.toggle-track .toggle-thumb{left:20px}
.toggle-label{font-size:11px;font-weight:600;color:#8492a6}
.toggle input:checked~.toggle-label{color:#10b981}

/* ── 기본 테이블 ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc}
th{padding:10px 13px;text-align:left;font-weight:600;color:#8492a6;white-space:nowrap;border-bottom:1px solid #e4e9f0}
td{padding:10px 13px;white-space:nowrap;border-bottom:1px solid #f8fafc}
tr:last-child td{border-bottom:none}
.td-code{font-family:'Courier New',monospace;font-size:11px;color:#8492a6}

/* ── 카테고리 필터 탭 ── */
.cat-tabs{display:flex;gap:6px;margin-bottom:14px}
.cat-tab{padding:7px 16px;border-radius:7px;border:1.5px solid #e4e9f0;background:#fff;color:#8492a6;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.cat-tab:hover{border-color:#c7d2fe;color:#4338ca}
.cat-tab.sel-전체{border-color:#1e2535;background:#1e2535;color:#fff;font-weight:700}
.cat-tab.sel-원자재{border-color:#1d4ed8;background:#dbeafe;color:#1d4ed8;font-weight:700}
.cat-tab.sel-부자재{border-color:#4338ca;background:#e0e7ff;color:#4338ca;font-weight:700}
.cat-tab.sel-원육{border-color:#be185d;background:#fce7f3;color:#be185d;font-weight:700}
.cat-tab.sel-제품{border-color:#166534;background:#dcfce7;color:#166534;font-weight:700}

/* ── 입출고 스프레드시트 ── */
.txn-sheet-wrap{overflow-x:auto}
.txn-sheet{width:100%;border-collapse:collapse;font-size:13px}
.txn-sheet thead tr.group-row th{padding:7px 4px;text-align:center;font-size:11px;font-weight:700;border-bottom:1px solid #e4e9f0}
.txn-sheet thead tr.col-row th{padding:8px 7px;text-align:center;font-size:11px;font-weight:600;color:#8492a6;border-bottom:2px solid #e4e9f0;white-space:nowrap}
.txn-sheet .th-info{background:#f8fafc;text-align:left!important}
.txn-sheet td.td-info{background:#f8fafc;padding:0 11px;height:43px;white-space:nowrap}
.th-prev{background:#eff6ff!important;color:#1d4ed8!important}
.td-prev{background:#eff6ff;text-align:right;padding:0 13px;height:43px;font-family:'Courier New',monospace;font-weight:600;color:#1d4ed8}
.th-in{background:#f0fdf4!important;color:#166534!important}
.th-out{background:#fdf2f8!important;color:#be185d!important}
.th-scrap{background:#fef2f2!important;color:#dc2626!important}
.th-adj{background:#fefce8!important;color:#a16207!important}
.th-today{background:#1e2535!important;color:#fff!important}
.td-input-cell{padding:4px 5px;height:43px}
.td-today{background:#1e2535;text-align:right;padding:0 13px;height:43px;font-family:'Courier New',monospace;font-weight:700;font-size:14px;color:#fff}
.td-today.minus{background:#7f1d1d;color:#fca5a5}
.txn-input{width:100%;height:34px;border:1.5px solid transparent;border-radius:6px;background:transparent;text-align:right;font-size:13px;font-family:'Courier New',monospace;font-weight:600;padding:0 9px;outline:none;transition:all .15s;cursor:pointer;color:#1e293b}
.txn-input:hover{background:#f8fafc;border-color:#e4e9f0}
.txn-input:focus{background:#fff;border-color:#3b7bff;box-shadow:0 0 0 3px rgba(59,123,255,.1);cursor:text}
.txn-input.has-val{background:rgba(255,255,255,.7)}
.td-in .txn-input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.td-in .txn-input.has-val{color:#166534}
.td-out .txn-input:focus{border-color:#ec4899;box-shadow:0 0 0 3px rgba(236,72,153,.1)}
.td-out .txn-input.has-val{color:#be185d}
.td-scrap .txn-input:focus{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.td-scrap .txn-input.has-val{color:#dc2626}
.td-adj .txn-input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.td-adj .txn-input.has-val{color:#a16207}

/* ── 날짜바 ── */
.date-bar{display:flex;align-items:center;gap:10px;margin-bottom:13px;padding:11px 15px;background:#fff;border:1px solid #e4e9f0;border-radius:10px;flex-wrap:wrap}
.date-bar .date-label{font-size:11px;color:#8492a6}
.date-bar input[type=date]{padding:6px 9px;border-radius:6px;border:1px solid #e4e9f0;font-size:13px;font-family:inherit;outline:none;color:#1e293b}
.date-bar input[type=date]:focus{border-color:#3b7bff}
.date-bar .auto-badge{font-size:11px;padding:3px 9px;background:#f0fdf4;color:#10b981;border-radius:99px;font-weight:600}
.date-bar .next-update{font-size:11px;color:#8492a6;margin-left:auto}
.save-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:9px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.save-banner .left{font-size:12px;color:#166534}

/* ── 평균/안전재고 패널 ── */
.avg-panel{margin-top:18px}
.avg-panel .panel-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.avg-panel .panel-title .badge{font-size:10px;padding:2px 8px;background:#eff6ff;color:#1d4ed8;border-radius:99px;font-weight:600}
.avg-table{width:100%;border-collapse:collapse;font-size:12px}
.avg-table th{padding:8px 12px;background:#f8fafc;text-align:center;font-weight:600;color:#8492a6;border-bottom:1px solid #e4e9f0;white-space:nowrap}
.avg-table td{padding:8px 12px;text-align:center;border-bottom:1px solid #f8fafc}
.avg-table td.td-nm{text-align:left;font-weight:600}
.avg-table td.mono{font-family:'Courier New',monospace;font-weight:600}
.safety-input{width:80px;height:28px;border:1.5px solid #e4e9f0;border-radius:5px;text-align:right;font-size:12px;font-family:'Courier New',monospace;padding:0 7px;outline:none;font-weight:600;color:#1d4ed8;background:#eff6ff}
.safety-input:focus{border-color:#3b7bff}
.warn-stock{color:#ef4444;font-weight:700}
.ok-stock{color:#10b981;font-weight:700}
.badge-warn{font-size:10px;padding:2px 7px;background:#fef2f2;color:#dc2626;border-radius:99px;font-weight:600}
.badge-ok{font-size:10px;padding:2px 7px;background:#dcfce7;color:#166534;border-radius:99px;font-weight:600}

/* ── 사용자 관리 ── */
.pending-alert{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:16px 18px;margin-bottom:20px}
.pending-alert h4{font-size:13px;font-weight:700;color:#92400e;margin-bottom:10px}
.pending-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;border-radius:8px;border:1px solid #fde68a;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.transfer-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:18px 20px;margin-top:20px}
.transfer-box h4{font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px}
.transfer-box p{font-size:12px;color:#78350f;margin-bottom:12px;line-height:1.6}

/* ── 기타 ── */
.chk-label{display:flex;align-items:center;gap:5px;font-size:12px;color:#8492a6;cursor:pointer}
.chk-label input{cursor:pointer}
.bar-track{height:6px;background:#f1f5f9;border-radius:99px}
.bar-fill{height:100%;border-radius:99px;background:#10b981}
.bar-fill.low{background:#ef4444}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row{margin-bottom:12px}
.form-row label{font-size:11px;color:#8492a6;display:block;margin-bottom:4px}
.form-row input,.form-row select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #e4e9f0;font-size:13px;font-family:inherit;outline:none;background:#fff}
.form-row input:focus,.form-row select:focus{border-color:#3b7bff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:#fff;border-radius:12px;width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box.wide{width:700px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:17px 22px 13px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#fff;z-index:1}
.modal-head h3{font-size:15px;font-weight:600}
.modal-head .close{background:none;border:none;font-size:22px;color:#8492a6;cursor:pointer;line-height:1}
.modal-body{padding:17px 22px 22px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.step-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.step-dot{width:24px;height:24px;border-radius:99px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-line{flex:1;height:1px;background:#e4e9f0}
.step-label{font-size:12px;white-space:nowrap}
#toast{position:fixed;bottom:22px;right:22px;background:#10b981;color:#fff;padding:10px 17px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.15);display:none}

/* ── 인쇄 ── */
@media print{
  @page{margin:10mm 12mm;size:A4 landscape}
  body,html{height:auto;background:#fff;font-size:11px}
  #app,#sidebar,#main,#topbar,#content{display:block;height:auto;overflow:visible}
  #sidebar,#topbar,#toast,#modal-root,#auth-screen,.no-print{display:none!important}
  #print-area{display:block!important}
}
#print-area{display:none}
.print-sheet{font-family:'Malgun Gothic',sans-serif}
.print-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;border-bottom:2px solid #1e2535;padding-bottom:8px}
.print-header .co-name{font-size:15px;font-weight:700}
.print-header .doc-title{font-size:18px;font-weight:900;color:#1e2535}
.print-header .meta{font-size:11px;color:#555;text-align:right;line-height:1.6}
.print-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.print-table th{padding:6px 8px;border:1px solid #ccc;background:#f0f4ff;font-weight:700;text-align:center}
.print-table td{padding:5px 8px;border:1px solid #ddd}
.print-table .r{text-align:right;font-family:'Courier New',monospace}
.print-table .c{text-align:center}
.print-sign{display:flex;gap:20px;margin-top:8px}
.print-sign .box{border:1px solid #ccc;width:80px;text-align:center;font-size:10px}
.print-sign .box .lbl{padding:3px;background:#f8fafc;border-bottom:1px solid #ccc}
.print-sign .box .sp{height:28px}
.print-footer{font-size:10px;color:#666;margin-top:6px;border-top:1px solid #ccc;padding-top:5px;display:flex;justify-content:space-between}
.cat-sec-title{font-size:12px;font-weight:700;padding:5px 8px;background:#e8edf5;border:1px solid #ccc;margin-bottom:0}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <span class="ico">🏭</span>
      <h1>공장 수불 관리</h1>
      <p>Factory MES · Inventory System</p>
    </div>

    <div class="auth-card" id="card-login">
      <div class="auth-tabs">
        <button class="auth-tab on"  onclick="switchTab('login')">로그인</button>
        <button class="auth-tab off" onclick="switchTab('signup')">회원가입 신청</button>
      </div>
      <div class="auth-body">
        <div class="lf"><label>아이디</label><input type="text" id="login-id" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="lf"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="auth-err" id="login-err"></div>
        <button class="auth-btn auth-btn-blue" onclick="doLogin()">로그인</button>
      </div>
    </div>

    <div class="auth-card" id="card-signup" style="display:none">
      <div class="auth-tabs">
        <button class="auth-tab off" onclick="switchTab('login')">로그인</button>
        <button class="auth-tab on"  onclick="switchTab('signup')">회원가입 신청</button>
      </div>
      <div class="auth-body">
        <div class="lf-grid">
          <div class="lf"><label>아이디 *</label><input type="text" id="su-id" placeholder="영문/숫자 조합"></div>
          <div class="lf"><label>비밀번호 *</label><input type="password" id="su-pw" placeholder="4자 이상"></div>
        </div>
        <div class="lf-grid">
          <div class="lf"><label>성명 *</label><input type="text" id="su-name" placeholder="홍길동"></div>
          <div class="lf"><label>전화번호 *</label><input type="text" id="su-phone" placeholder="010-0000-0000"></div>
        </div>

══════════════════════════════ */
function calcStockUpto(itemId,beforeDate){
  let s=0;
  // 파이어베이스에 저장된 진짜 기록(TXN_LOG)을 기반으로 누적 계산
  TXN_LOG.forEach(t=>{
    if(t.iid===itemId&&t.dt<beforeDate){
      if(t.tp==='입고')s+=t.qty;
      else if(t.tp==='출고'||t.tp==='폐기')s-=t.qty;
      else if(t.tp==='재고조정')s+=t.qty;
    }
  });
  return s;
}
function getPrevStock(itemId,date){
  if(PREV_STOCK_SNAP[date]?.[itemId]!==undefined)return PREV_STOCK_SNAP[date][itemId];
  return calcStockUpto(itemId,date);
}
function getTodayStock(itemId,date){
  const p=getPrevStock(itemId,date);
  const c=TXN_SHEET[date]?.[itemId]||{};
  return p+(c.in||0)-(c.out||0)-(c.scrap||0)+(c.adj||0);
}
function setCell(date,itemId,field,val){
  if(!TXN_SHEET[date])TXN_SHEET[date]={};
  if(!TXN_SHEET[date][itemId])TXN_SHEET[date][itemId]={};
  TXN_SHEET[date][itemId][field]=val;
}
function snapPrevStock(date){
  if(!PREV_STOCK_SNAP[date])PREV_STOCK_SNAP[date]={};
  ITEMS.filter(i=>i.on).forEach(it=>{PREV_STOCK_SNAP[date][it.id]=calcStockUpto(it.id,date)});
}

// TXN_LOG 변경 후 TXN_SHEET + PREV_STOCK_SNAP 전체 재구성
function rebuildCaches(){
  TXN_SHEET={};
  PREV_STOCK_SNAP={};
  // TXN_LOG → TXN_SHEET 재구성
  TXN_LOG.sort((a,b)=>a.dt.localeCompare(b.dt));
  TXN_LOG.forEach(t=>{
    if(!TXN_SHEET[t.dt])TXN_SHEET[t.dt]={};
    if(!TXN_SHEET[t.dt][t.iid])TXN_SHEET[t.dt][t.iid]={};
    if(t.tp==='입고')     TXN_SHEET[t.dt][t.iid].in    =(TXN_SHEET[t.dt][t.iid].in   ||0)+t.qty;
    if(t.tp==='출고')     TXN_SHEET[t.dt][t.iid].out   =(TXN_SHEET[t.dt][t.iid].out  ||0)+t.qty;
    if(t.tp==='폐기')     TXN_SHEET[t.dt][t.iid].scrap =(TXN_SHEET[t.dt][t.iid].scrap||0)+t.qty;
    if(t.tp==='재고조정') TXN_SHEET[t.dt][t.iid].adj   =(TXN_SHEET[t.dt][t.iid].adj  ||0)+t.qty;
  });
}
function schedMidnightSnap(){

/* ══════════════════════════════

══════════════════════════════ */
function calcAvgStats(itemId){
  const logs=TXN_LOG.filter(t=>t.iid===itemId);
  const days=[...new Set(logs.map(t=>t.dt))].length||1;
  const totalIn=logs.filter(t=>t.tp==='입고').reduce((s,t)=>s+t.qty,0);
  const totalOut=logs.filter(t=>t.tp==='출고').reduce((s,t)=>s+t.qty,0);
  const totalScrap=logs.filter(t=>t.tp==='폐기').reduce((s,t)=>s+t.qty,0);
  return{
    avgIn:Math.round(totalIn/days*10)/10,
    avgOut:Math.round(totalOut/days*10)/10,
    avgScrap:Math.round(totalScrap/days*10)/10,
    days
  };
}
function calcRecommSafety(avgOut){return Math.ceil(avgOut*3)}

/* 최근 10일 출고 일평균 × 15 = 자동 안전재고 */
function calcAutoSafetyStock(itemId){
  const today=todayStr();
  const from=new Date();from.setDate(from.getDate()-10);
  const fromStr=from.toISOString().slice(0,10);
  const totalOut=TXN_LOG
    .filter(t=>t.iid===itemId&&t.tp==='출고'&&t.dt>=fromStr&&t.dt<=today)
    .reduce((s,t)=>s+t.qty,0);
  return Math.ceil((totalOut/10)*15);
}

/* 최근 30일 출고 일평균 기준 예상 운영 일수 (제품·부자재만) */
function calcExpectedDays(itemId,c1){
  if(c1!=='제품'&&c1!=='부자재')return null;
  const today=todayStr();
  const from=new Date();from.setDate(from.getDate()-30);
  const fromStr=from.toISOString().slice(0,10);
  const totalOut=TXN_LOG
    .filter(t=>t.iid===itemId&&t.tp==='출고'&&t.dt>=fromStr&&t.dt<=today)
    .reduce((s,t)=>s+t.qty,0);
  const avgPerDay=totalOut/30;
  if(avgPerDay<=0)return null;
  const stock=getTodayStock(itemId,today);
  if(stock<=0)return 0;
  return Math.floor(stock/avgPerDay);
}

/* 유효 안전재고: 수동 설정 > 자동 계산 */
function getEffectiveSafety(it){
  if(SAFETY_STOCK[it.id]!==undefined)return SAFETY_STOCK[it.id];
  return calcAutoSafetyStock(it.id);
}

        style="width:130px;padding:6px 8px;border-radius:5px;border:1px solid #e4e9f0;font-size:12px;font-family:'Courier New',monospace"
        onchange="pendingLots['${itemId}'][${i}].lotNo=this.value">`:''}
      <input type="date" value="${l.expiry||''}"
        style="padding:6px 8px;border-radius:5px;border:1px solid #e4e9f0;font-size:12px"
        onchange="pendingLots['${itemId}'][${i}].expiry=this.value">
      <input type="number" min="1" value="${l.qty||''}" placeholder="수량"
        style="width:80px;padding:6px 8px;border-radius:5px;border:1px solid #e4e9f0;font-size:12px;text-align:right;font-family:'Courier New',monospace"
        onchange="pendingLots['${itemId}'][${i}].qty=Number(this.value)">
      <button onclick="removeLotEntry('${itemId}',${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;line-height:1">×</button>
    </div>`).join('');

  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <div class="modal-head">
          <h3>🏷 묶음(Lot) 정보 입력</h3>
          <button class="close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div style="background:#eff6ff;border-radius:8px;padding:10px 13px;margin-bottom:14px;font-size:12px;color:#1d4ed8">
            <strong>${it.nm}</strong> — 입고 수량: <strong>${fmt(totalQty)} ${it.ut}</strong><br>
            ${haslotno?'이력번호(12자리 숫자)와 소비기한을 묶음별로 입력하세요.':'소비기한을 묶음별로 입력하세요.'}<br>
            <span style="color:#4338ca">입력된 수량 합계: ${fmt(usedQty)} / ${fmt(totalQty)} ${it.ut}</span>
          </div>
          <div id="lot-entries">${lotRows}</div>
          <button class="btn btn-white btn-sm" onclick="addLotEntry('${itemId}','${it.c1}')" style="margin-bottom:14px">+ 묶음 추가</button>
          <div class="modal-footer">
            <button class="btn btn-white" onclick="closeModal()">취소</button>
            <button class="btn btn-blue" onclick="saveLotModal('${itemId}',${totalQty})">확인</button>
          </div>
        </div>
      </div>
    </div>`;
}

function addLotEntry(itemId,c1){
  if(!pendingLots[itemId])pendingLots[itemId]=[];
  pendingLots[itemId].push({lotNo:'',expiry:'',qty:0});
  openLotModal(itemId);
}
function removeLotEntry(itemId,idx){
  pendingLots[itemId].splice(idx,1);
  openLotModal(itemId);
}
function saveLotModal(itemId,totalQty){
  const entries=pendingLots[itemId]||[];
  const it=ITEMS.find(i=>i.id===itemId);
  const haslotno=needsLotNo(it?.c1);
  // 검증
  for(const e of entries){
    if(!e.expiry){showToast('소비기한을 입력해주세요.','#ef4444');return}
    if(haslotno&&(!e.lotNo||!/^\d{12}$/.test(e.lotNo))){showToast('이력번호는 12자리 숫자여야 합니다.','#ef4444');return}
    if(!e.qty||e.qty<=0){showToast('각 묶음의 수량을 입력해주세요.','#ef4444');return}
  }
  const used=entries.reduce((s,e)=>s+Number(e.qty),0);
  if(used>totalQty){showToast(`묶음 수량 합계(${fmt(used)})가 입고 수량(${fmt(totalQty)})을 초과합니다.`,'#ef4444');return}
  closeModal();
  showToast('묶음 정보가 저장되었습니다. 저장 버튼을 눌러 확정하세요.','#3b7bff');
  // 해당 행 lot 버튼 업데이트
  const btn=document.getElementById(`lot-btn-${itemId}`);
  if(btn){btn.style.background='#dbeafe';btn.style.color='#1d4ed8';btn.textContent=`🏷 ${entries.length}묶음`;}
}

/* 재고 현황 lot 섹션 */
function renderLotSection(itemId,c1){
  const lots=getActiveLots(itemId);
  if(lots.length===0)return`<tr><td colspan="3" style="padding:5px 13px 5px 30px;font-size:11px;color:#8492a6">묶음 정보 없음</td></tr>`;
  return lots.map(l=>{
    const badge=expiryBadge(l.expiry);
    return`<tr style="background:#fafbfd">
      <td colspan="2" style="padding:4px 13px 4px 32px;font-size:11px;color:#475569">
        ${needsLotNo(c1)?`<span style="font-family:'Courier New',monospace;color:#1d4ed8;font-size:11px">No.${l.lotNo}</span> `:''}
        ${badge} 소비기한: ${fmtDate(l.expiry)}
      </td>
      <td style="font-family:'Courier New',monospace;font-size:11px;text-align:right;padding-right:13px;color:#374151">
        ${fmt(l.remainQty)} ${iunit(itemId)}
      </td>
      <td colspan="6"></td>
    </tr>`;
  }).join('');
}

function goMenu(k){
  if(k==='users'&&!isMaster()){showToast('마스터 계정만 접근 가능합니다.','#ef4444');return}
  curMenu=k;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));

}

function renderDashboard(){
  const today=todayStr();
  const onItems=ITEMS.filter(i=>i.on);
  const offCnt=ITEMS.filter(i=>!i.on).length;
  const defQ=TXN_LOG.filter(t=>t.tp==='폐기').reduce((s,t)=>s+t.qty,0);

  // 분류별 재고 정상/미달 집계 (단위 혼용 문제 해결)
  const catColors={원자재:'#1d4ed8',부자재:'#4338ca',원육:'#be185d',제품:'#166534'};
  const catBadges=CATS.slice(1).map(c=>{
    const items=ITEMS.filter(i=>i.on&&i.c1===c);
    const warnCnt=items.filter(it=>{
      const stock=getTodayStock(it.id,today);
      const safety=getEffectiveSafety(it);
      return stock<safety;
    }).length;
    return`<div style="padding:12px 14px;background:#f8fafc;border-radius:8px;text-align:center;border-top:3px solid ${catColors[c]||'#8492a6'}">
      ${pill(c)}
      <div style="font-size:22px;font-weight:700;margin-top:5px;font-family:'Courier New',monospace">${items.length}</div>
      <div style="font-size:10px;color:#8492a6;margin-top:2px">품목</div>
      ${warnCnt>0?`<div style="font-size:10px;color:#dc2626;font-weight:600;margin-top:3px">⚠ 미달 ${warnCnt}건</div>`:'<div style="font-size:10px;color:#10b981;margin-top:3px">✓ 전체 정상</div>'}
    </div>`;
  }).join('');

  const DB_CATS=['전체','원자재','부자재','원육','제품'];
  const dashItems=dashCatFilter==='전체'
    ? sortItemsByNm(onItems)
    : sortItemsByNm(onItems.filter(i=>i.c1===dashCatFilter));

  const dashTabs=DB_CATS.map(c=>{
    const cnt=c==='전체'?onItems.length:onItems.filter(i=>i.c1===c).length;
    const warnN=c==='전체'
      ? onItems.filter(it=>getTodayStock(it.id,today)<getEffectiveSafety(it)).length
      : onItems.filter(it=>it.c1===c&&getTodayStock(it.id,today)<getEffectiveSafety(it)).length;
    return`<button onclick="dashCatFilter='${c}';renderContent()"
      style="padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;
        ${c===dashCatFilter?'background:#1e2535;color:#fff':'background:#f1f5f9;color:#64748b'}">
      ${c} (${cnt})${warnN>0?` <span style="color:#f87171">⚠${warnN}</span>`:''}
    </button>`;
  }).join('');

  const maxS=Math.max(...dashItems.map(i=>getTodayStock(i.id,today)),1);
  const bars=dashItems.length===0
    ? `<div style="color:#8492a6;font-size:12px;padding:20px 0">해당 분류에 사용 품목이 없습니다.</div>`
    : dashItems.map(it=>{
        const stock=getTodayStock(it.id,today);
        const pct=Math.min(100,Math.round(stock/maxS*100));
        const safety=getEffectiveSafety(it);
        const low=stock<safety;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;gap:8px">
            <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${it.nm}</span>
            <span style="font-size:12px;font-family:'Courier New',monospace;color:${low?'#ef4444':'#8492a6'};flex-shrink:0">${fmt(stock)} ${it.ut}${low?' ⚠':''}</span>
          </div>
          <div class="bar-track"><div class="bar-fill${low?' low':''}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
  const recentLog=[...TXN_LOG].sort((a,b)=>b.dt.localeCompare(a.dt)).slice(0,6).map(t=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f8fafc">
      <div style="display:flex;align-items:center;gap:7px">${pill(t.tp)}<span style="font-size:12px">${iname(t.iid)}</span></div>
      <div style="text-align:right"><div style="font-size:12px;font-family:'Courier New',monospace;font-weight:600">${fmt(t.qty)} ${iunit(t.iid)}</div><div style="font-size:10px;color:#8492a6">${t.dt}</div></div>
    </div>`).join('');
  const warnCnt=onItems.filter(it=>getTodayStock(it.id,today)<getEffectiveSafety(it)).length;
  const okCnt=onItems.length-warnCnt;
  return`
    <div class="stat-grid">
      <div class="stat-card" style="border-top:3px solid #3b7bff"><div class="label">사용 품목</div><div class="value">${onItems.length}</div><div class="sub">비사용 ${offCnt}건 제외</div></div>
      <div class="stat-card" style="border-top:3px solid #10b981"><div class="label">재고 정상</div><div class="value" style="color:#10b981">${okCnt}</div><div class="sub">${fmtDate(today)} 기준</div></div>
      <div class="stat-card" style="border-top:3px solid #f59e0b"><div class="label">누적 폐기</div><div class="value">${fmt(defQ)}</div><div class="sub">전체 기간 누계</div></div>
      <div class="stat-card" style="border-top:3px solid #ef4444"><div class="label">안전재고 미달</div><div class="value" style="color:${warnCnt>0?'#ef4444':'#10b981'}">${warnCnt}</div><div class="sub">${warnCnt>0?'⚠ 보충 필요':'✓ 전체 정상'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">${catBadges}</div>
    <div class="grid-2">
      <div class="card card-pad">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:13px;font-weight:600">사용 품목 재고 현황</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${dashTabs}</div>
        <div style="max-height:320px;overflow-y:auto;padding-right:4px">${bars}</div>
      </div>
      <div class="card card-pad"><div style="font-size:13px;font-weight:600;margin-bottom:12px">최근 입출고 내역</div>${recentLog}</div>
    </div>`;
}

function renderItems(){

  const onCnt=ITEMS.filter(i=>i.on).length;

  const catCounts={};
  ITEM_CATS.forEach(c=>{
    catCounts[c]=c==='전체'
      ?ITEMS.filter(i=>showInactive||i.on).length
      :ITEMS.filter(i=>(showInactive||i.on)&&i.c1===c).length;
  });
  const catTabs=ITEM_CATS.map(c=>`
    <button class="cat-tab${c===itemCatFilter?' sel-'+(c==='전체'?'all':c):''}"

      style="${c===itemCatFilter&&c==='전체'?'background:#1e2535;color:#fff;border-color:#1e2535':''}">

  const baseList=showInactive?ITEMS:ITEMS.filter(i=>i.on);
  const filtered=itemCatFilter==='전체'?baseList:baseList.filter(i=>i.c1===itemCatFilter);
  const vis=sortItems(filtered);

  const rows=vis.length===0
    ?`<tr><td colspan="11" style="padding:32px;text-align:center;color:#8492a6">등록된 품목이 없습니다.</td></tr>`
    :vis.map(it=>`
      <tr style="${!it.on?'opacity:.5;background:#fafafa':''}">
        <td><span class="td-code">${it.id}</span></td>
        <td>${pill(it.c1)}</td>
        <td style="color:#8492a6">${it.c2}</td>
        <td><strong>${it.nm}</strong></td>
        <td style="color:#8492a6;font-size:11px">${it.sp}</td>
        <td>${it.ut}</td>
        <td>${it.su}</td>
        <td style="font-family:'Courier New',monospace;text-align:right">${fmt(it.safetyStock)}</td>
        <td><label class="toggle"><input type="checkbox" ${it.on?'checked':''} onchange="toggleItem('${it.id}',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div><span class="toggle-label">${it.on?'사용':'비사용'}</span></label></td>
        <td>${canEdit()?`<button class="btn btn-sm" style="background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;white-space:nowrap" onclick="openEditItemModal('${it.id}')">✏ 수정</button>`:''}</td>
        <td>${canEdit()?`<button class="btn btn-danger btn-sm" onclick="deleteItem('${it.id}')" title="품목 삭제">🗑</button>`:''}</td>
      </tr>`).join('');

  return`
    <div class="cat-tabs">${catTabs}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8492a6">
        <span>전체 ${ITEMS.length}건</span><span style="color:#e4e9f0">|</span>
        <span style="color:#10b981;font-weight:600">사용 ${onCnt}건</span><span style="color:#e4e9f0">|</span>
        <span>비사용 ${offCnt}건</span><span style="color:#e4e9f0">|</span>
        <span style="color:#3b7bff;font-weight:600">표시 ${vis.length}건</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label class="chk-label"><input type="checkbox" ${showInactive?'checked':''} onchange="toggleShowInactive(this.checked)">비사용 포함</label>
        ${canEdit()?`<button class="btn btn-sm" style="background:#fef2f2;color:#ef4444;border:1px solid #fecaca" onclick="deleteAllItems()">🗑 전체 삭제</button>`:''}
      </div>
    </div>
    <div class="card"><div class="tbl-wrap">
      <table><thead><tr>
        <th>품목코드</th><th>분류1</th><th>분류2</th><th>제품명</th>
        <th>규격</th><th>단위</th><th>거래처</th><th style="text-align:right">안전재고</th><th>운영</th>
        <th style="text-align:center">${canEdit()?'수정':''}</th>
        <th style="text-align:center">${canEdit()?'삭제':''}</th>

}

  if(!canEdit()){showToast('편집 권한이 없습니다.','#ef4444');renderContent();return}
  const it = ITEMS.find(i=>i.id===id);

    await window.fbUpdateDoc(window.fbDoc(window.db, "items", it._docId), { on: val });

async function saveEditItem(id){
  const it=ITEMS.find(i=>i.id===id);if(!it)return;
  const nm=document.getElementById('ei-nm').value.trim();
  if(!nm){alert('제품명을 입력하세요.');return}
  const updated={
    c1:document.getElementById('ei-c1').value,
    c2:document.getElementById('ei-c2').value.trim(),
    nm,
    sp:document.getElementById('ei-sp').value.trim(),
    ut:document.getElementById('ei-ut').value.trim()||'EA',
    su:document.getElementById('ei-su').value.trim(),
    safetyStock:Number(document.getElementById('ei-ss').value)||0,
  };
  try{
    await window.fbUpdateDoc(window.fbDoc(window.db,'items',it._docId),updated);
    Object.assign(it,updated);
    closeModal();renderContent();
    showToast(`[${id}] ${nm} 수정 완료`,'#3b7bff');
  }catch(e){console.error(e);alert('수정 저장 실패!');}
}

async function deleteAllItems(){
  if(!canEdit()){showToast('편집 권한이 없습니다.','#ef4444');return}
  if(ITEMS.length===0){showToast('삭제할 품목이 없습니다.','#f59e0b');return}
  if(!confirm(`⚠ 전체 삭제\n\n품목 ${ITEMS.length}건과 관련 입출고 이력을 모두 삭제합니다.\n이 작업은 되돌릴 수 없습니다.\n\n정말 삭제하시겠습니까?`))return;
  try{
    const batch=window.fbWriteBatch(window.db);
    ITEMS.forEach(it=>{if(it._docId)batch.delete(window.fbDoc(window.db,'items',it._docId))});
    TXN_LOG.forEach(t=>{if(t._docId)batch.delete(window.fbDoc(window.db,'txns',t._docId))});
    LOTS.forEach(l=>{if(l._docId)batch.delete(window.fbDoc(window.db,'lots',l._docId))});
    await batch.commit();
    ITEMS=[];TXN_LOG=[];TXN_SHEET={};PREV_STOCK_SNAP={};LOTS=[];pendingLots={};
    renderContent();showToast('전체 품목 및 이력이 삭제되었습니다.','#ef4444');
  }catch(e){console.error(e);alert('전체 삭제 중 오류 발생!');}
}

// 🔥 품목 삭제 시 DB에서 삭제
async function deleteItem(id){
  if(!canEdit()){showToast('편집 권한이 없습니다.','#ef4444');return}
  const it=ITEMS.find(i=>i.id===id);
  if(!it)return;
  const hasTxn=TXN_LOG.some(t=>t.iid===id);
  const confirmMsg=hasTxn
    ?`⚠ [${id}] ${it.nm}\n\n이 품목에 입출고 이력이 존재합니다.\n삭제하면 관련 수불 데이터도 함께 제거됩니다.\n\n정말 삭제하시겠습니까?`
    :`[${id}] ${it.nm}\n\n품목을 삭제하시겠습니까?`;
  if(!confirm(confirmMsg))return;
  
  try {
    // 1. 품목 DB 삭제
    await window.fbDeleteDoc(window.fbDoc(window.db, "items", it._docId));
    ITEMS=ITEMS.filter(i=>i.id!==id);
    
    // 2. 관련된 수불 내역(txns)도 DB에서 일괄 삭제
    const logsToDelete = TXN_LOG.filter(t => t.iid === id);
    if (logsToDelete.length > 0) {
      const batch = window.fbWriteBatch(window.db);
      logsToDelete.forEach(log => {
        batch.delete(window.fbDoc(window.db, "txns", log._docId));
      });
      await batch.commit();
    }
    TXN_LOG=TXN_LOG.filter(t=>t.iid!==id);
    Object.keys(TXN_SHEET).forEach(d=>{if(TXN_SHEET[d]?.[id])delete TXN_SHEET[d][id]});
    
    renderContent();
    showToast(`[${id}] ${it.nm} 품목이 완전히 삭제되었습니다.`,'#ef4444');
  } catch(e) { console.error(e); alert("삭제 중 오류 발생!"); }
}

function renderTxn(){

  // ── 카테고리 탭 (전체 제외) ──
  const TXN_CATS=['원자재','부자재','원육','제품'];
  if(!TXN_CATS.includes(txnCatFilter)) txnCatFilter='원자재';
  const baseItems=sortItems(ITEMS.filter(i=>i.on&&i.c1===txnCatFilter));

  const sheetDay=TXN_SHEET[date]||{};
  const savedCnt=Object.values(sheetDay).filter(c=>(c.in||0)+(c.out||0)+(c.scrap||0)+(c.adj||0)!==0).length;
  const now=new Date(),next=new Date(now);next.setHours(24,0,0,0);
  const diff=next-now;
  const hh=String(Math.floor(diff/3600000)).padStart(2,'0');
  const mm=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');

  const catTabsHtml=TXN_CATS.map(c=>{

function setCatFilter(c){txnCatFilter=c;pendingLots={};renderContent()}
function setPendingLot(itemId,field,value){
  if(!pendingLots[itemId])pendingLots[itemId]={};
  pendingLots[itemId][field]=value;
}
function hasExpiry_any(items){return items.some(i=>needsLot(i.c1))}
function changeTxnDate(v){
  txnDate=v;
  if(!PREV_STOCK_SNAP[v]){PREV_STOCK_SNAP[v]={};ITEMS.filter(i=>i.on).forEach(it=>{PREV_STOCK_SNAP[v][it.id]=calcStockUpto(it.id,v)})}
  renderContent();
}
function onCellChange(itemId,field,input){
  if(!canEdit())return;
  const v=Number(input.value)||0;
  setCell(txnDate,itemId,field,v);input.classList.toggle('has-val',v!==0);refreshRow(itemId);
}
function refreshRow(itemId){
  const inV=Number(document.querySelector(`#row-${itemId} .td-in input`)?.value)||0;
  const outV=Number(document.querySelector(`#row-${itemId} .td-out input`)?.value)||0;
  const scrapV=Number(document.querySelector(`#row-${itemId} .td-scrap input`)?.value)||0;
  const adjV=Number(document.querySelector(`#row-${itemId} .td-adj input`)?.value)||0;
  const el=document.getElementById('today-'+itemId);if(!el)return;
  const q=getPrevStock(itemId,txnDate)+inV-outV-scrapV+adjV;
  el.textContent=fmt(q);el.classList.toggle('minus',q<0);
}

// 🔥 입출고(수불장) 내역 DB 일괄 저장 + 묶음(Lot) 처리
async function saveSheet() {
  if(!canEdit()){showToast('편집 권한이 없습니다.','#ef4444');return}
  const date = txnDate;
  let saved = 0;
  const batch = window.fbWriteBatch(window.db);

  for (const it of ITEMS.filter(i => i.on)) {
    const inV    = Number(document.querySelector(`#row-${it.id} .td-in input`)?.value)    || 0;
    const outV   = Number(document.querySelector(`#row-${it.id} .td-out input`)?.value)   || 0;
    const scrapV = Number(document.querySelector(`#row-${it.id} .td-scrap input`)?.value) || 0;
    const adjV   = Number(document.querySelector(`#row-${it.id} .td-adj input`)?.value)   || 0;

    if(inV + outV + scrapV + adjV === 0) continue;

    // ① 같은 날짜+품목 기존 Firebase 레코드 삭제 → 중복 방지 핵심 처리
    const existing = TXN_LOG.filter(t => t.dt === date && t.iid === it.id);
    existing.forEach(t => {
      if(t._docId) batch.delete(window.fbDoc(window.db, 'txns', t._docId));
    });
    TXN_LOG = TXN_LOG.filter(t => !(t.dt === date && t.iid === it.id));
    if(TXN_SHEET[date]) delete TXN_SHEET[date][it.id];

    // ② TXN_SHEET 업데이트
    setCell(date, it.id, 'in',      inV);
    setCell(date, it.id, 'out',     outV);
    setCell(date, it.id, 'scrap',   scrapV);
    setCell(date, it.id, 'adj',     adjV);
    setCell(date, it.id, 'savedAt', new Date().toLocaleTimeString('ko-KR'));

    // ③ 새 레코드 생성
    const ts = Date.now();
    const logs = [];
    if(inV    > 0) logs.push({ dt:date, tp:'입고',    iid:it.id, qty:inV,    nt:'', mg:curUser.name });
    if(outV   > 0) logs.push({ dt:date, tp:'출고',    iid:it.id, qty:outV,   nt:'', mg:curUser.name });
    if(scrapV > 0) logs.push({ dt:date, tp:'폐기',    iid:it.id, qty:scrapV, nt:'', mg:curUser.name });
    if(adjV  !== 0)logs.push({ dt:date, tp:'재고조정',iid:it.id, qty:adjV,   nt:'', mg:curUser.name });

    logs.forEach((log, i) => {
      log.id = `T-${ts}-${it.id}-${i}`;
      const newRef = window.fbDoc(window.fbCollection(window.db, 'txns'));
      batch.set(newRef, log);
      log._docId = newRef.id;
      TXN_LOG.push(log);
    });

    // ④ 묶음(Lot) 처리
    if(needsLot(it.c1)){
      // 입고: 소비기한 정보가 있을 때만 lot 생성 (과거·오늘 모두 적용)
      if(inV > 0){
        const pending = pendingLots[it.id] || {};
        // 소비기한이나 이력번호가 입력된 경우에만 lot 생성
        if(pending.expiry || pending.lotNo){
          const newLot = {
            itemId: it.id, lotNo: pending.lotNo||'', expiry: pending.expiry||'',
            inQty: inV, remainQty: inV, inDate: date, status:'active'
          };
          const lotRef = window.fbDoc(window.fbCollection(window.db,'lots'));
          batch.set(lotRef, newLot);
          newLot._docId = lotRef.id;
          LOTS.push(newLot);
        }
        delete pendingLots[it.id];
      }
      // 출고/폐기: 오늘 날짜 저장 시에만 lot 차감 (과거 소급 차감 시 에러 방지)
      const isToday = date === todayStr();
      const deductQty = outV + scrapV;
      if(deductQty > 0 && isToday){
        let remain = deductQty;
        for(const lot of getActiveLots(it.id)){
          if(remain <= 0) break;
          if(!lot._docId) continue; // Firebase에 아직 없는 lot은 건너뜀
          const deduct = Math.min(lot.remainQty, remain);
          lot.remainQty -= deduct;
          remain -= deduct;
          if(lot.remainQty <= 0) lot.status = 'depleted';
          try{
            batch.update(window.fbDoc(window.db,'lots',lot._docId),
              {remainQty:lot.remainQty, status:lot.status});
          }catch(e){ console.warn('lot update skip:', e); }
        }
      }
    }
    saved++;
  }

  if(saved === 0){ showToast('입력된 수량이 없습니다.','#f59e0b'); return; }

  try {
    await batch.commit();
    rebuildCaches(); // TXN_LOG 변경 → PREV_STOCK_SNAP·TXN_SHEET 재구성
    pendingLots = {};
    showToast(`${saved}개 품목 저장 완료`, '#3b7bff');
    renderContent();
  } catch(e){
    console.error(e); alert('수불 내역 저장 실패!');
  }
}

        <th colspan="2">상태</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div></div>
    <div class="avg-panel">
      <div class="panel-title">
        📊 입출고 평균 분석 &amp; 안전재고 설정
        <span class="badge">최근 데이터 기준</span>
        <button class="btn btn-white btn-sm" style="margin-left:auto" onclick="toggleAvgPanel()">${showAvgPanel?'접기':'펼치기'}</button>

function renderLedger(){
  if(!ledgerDateFrom){
    const n=new Date();
    ledgerDateFrom=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`;
  }
  if(!ledgerDateTo) ledgerDateTo=todayStr();

  const LEDGER_CATS=['전체','원자재','부자재','원육','제품'];
  const LOT_CATS_SET=new Set(['원자재','원육','제품']);
  const today=todayStr();

  // 오늘 출고/폐기 발생 품목 — 외부 스코프에서 선언해야 buildNonLotRows에서도 참조 가능
  const todayTxnItems=new Set(
    TXN_LOG.filter(t=>t.dt===today&&(t.tp==='출고'||t.tp==='폐기')).map(t=>t.iid)
  );

  // 탭 카운트: 수불 이력 있는 품목 수
  const catCountMap={};
  LEDGER_CATS.forEach(c=>{
    if(c==='전체') catCountMap[c]=new Set(TXN_LOG.map(t=>t.iid)).size;
    else catCountMap[c]=new Set(
      TXN_LOG.filter(t=>{const it=ITEMS.find(i=>i.id===t.iid);return it&&it.c1===c;}).map(t=>t.iid)
    ).size;
  });
  const catTabs=LEDGER_CATS.map(c=>`
    <button class="cat-tab${c===ledgerCatFilter?' sel-'+(c==='전체'?'all':c):''}"
      onclick="ledgerCatFilter='${c}';ledgerFilter.iid='';renderContent()"
      style="${c===ledgerCatFilter&&c==='전체'?'background:#1e2535;color:#fff;border-color:#1e2535':''}">
      ${c} <span style="font-size:10px;opacity:.75">(${catCountMap[c]})</span></button>`).join('');

  // ── Lot 행: 원자재·원육·제품 ──
  function buildLotRows(){
    let lotList=LOTS.filter(l=>{
      const it=ITEMS.find(i=>i.id===l.itemId);
      if(!it||!LOT_CATS_SET.has(it.c1))return false;
      if(ledgerCatFilter!=='전체'&&it.c1!==ledgerCatFilter)return false;
      if(ledgerFilter.iid&&l.itemId!==ledgerFilter.iid)return false;
      if(ledgerDateTo&&l.inDate>ledgerDateTo)return false;
      const rem=l.remainQty||0;
      if(rem<=0&&!todayTxnItems.has(l.itemId))return false;
      return true;
    }).sort((a,b)=>{
      const ia=ITEMS.find(i=>i.id===a.itemId)||{};
      const ib=ITEMS.find(i=>i.id===b.itemId)||{};
      const c1=(ia.c1||'').localeCompare(ib.c1||'','ko',{sensitivity:'base'});if(c1!==0)return c1;
      const c2=(ia.c2||'').localeCompare(ib.c2||'','ko',{sensitivity:'base'});if(c2!==0)return c2;
      const nm=(ia.nm||'').localeCompare(ib.nm||'','ko',{sensitivity:'base'});if(nm!==0)return nm;
      return(a.expiry||'').localeCompare(b.expiry||'');
    });

    // lot 없는 lot-관리 품목 → 현재 재고 있는 품목 전체 표시
    const itemsWithActiveLots=new Set(LOTS.filter(l=>(l.remainQty||0)>0).map(l=>l.itemId));

    // 재고 있는 품목 기준으로 대상 품목 목록 생성 (거래 없어도 포함)
    const candidateItems=ITEMS.filter(i=>{
      if(!LOT_CATS_SET.has(i.c1))return false;
      if(itemsWithActiveLots.has(i.id))return false;
      if(ledgerCatFilter!=='전체'&&i.c1!==ledgerCatFilter)return false;
      if(ledgerFilter.iid&&i.id!==ledgerFilter.iid)return false;
      const stock=getTodayStock(i.id,today);
      return stock>0||todayTxnItems.has(i.id);
    });

    // 날짜 범위 내 거래 집계 (없으면 0)
    const txnByItem={};
    candidateItems.forEach(i=>{txnByItem[i.id]={iid:i.id,in:0,out:0,scrap:0,adj:0,mg:''};});
    TXN_LOG.filter(t=>{
      if(!txnByItem[t.iid])return false;
      if(ledgerDateFrom&&t.dt<ledgerDateFrom)return false;
      if(ledgerDateTo&&t.dt>ledgerDateTo)return false;
      return true;
    }).forEach(t=>{
      if(t.tp==='입고')     txnByItem[t.iid].in   +=t.qty;
      if(t.tp==='출고')     txnByItem[t.iid].out  +=t.qty;
      if(t.tp==='폐기')     txnByItem[t.iid].scrap+=t.qty;
      if(t.tp==='재고조정') txnByItem[t.iid].adj  +=t.qty;
      if(t.mg) txnByItem[t.iid].mg=t.mg;
    });

    const txnList=Object.values(txnByItem).sort((a,b)=>a.iid.localeCompare(b.iid));
    const txnZero=new Set(
      candidateItems.filter(i=>{
        const s=getTodayStock(i.id,today);
        return s<=0&&!todayTxnItems.has(i.id);
      }).map(i=>i.id)
    );

    const lotHtml=lotList.map(l=>{
      const it=ITEMS.find(i=>i.id===l.itemId)||{};
      const used=(l.inQty||0)-(l.remainQty||0);
      const d=expiryDays(l.expiry);
      const dc=d===null?'#8492a6':d<0?'#dc2626':d<=30?'#dc2626':d<=60?'#a16207':'#166634';
      const dLabel=d===null?'':d<0?'⛔기한초과':`D-${d}`;
      const rem=l.remainQty||0;
      return`<tr${rem<=0?' style="background:#fff8f8"':'' }>
        <td style="text-align:center;color:#64748b;font-size:12px;white-space:nowrap">${fmtDate(l.inDate)}</td>
        <td>${pill(it.c1||'')}</td>
        <td style="color:#8492a6;font-size:11px">${it.c2||''}</td>
        <td style="color:#8492a6;font-size:11px">${it.ut||''}</td>
        <td style="font-weight:600">${it.nm||''}</td>
        <td style="padding:4px 8px;vertical-align:middle">
          ${l.expiry
            ?`<div style="font-size:11px;font-weight:700;color:#1e293b;white-space:nowrap">${fmtDate(l.expiry)}</div>
               <div style="font-size:10px;font-weight:700;color:${dc}">${dLabel}</div>`
            :'<span style="font-size:10px;color:#d1d5db">미등록</span>'}
        </td>
        <td style="padding:4px 8px;font-family:'Courier New',monospace;font-size:11px;font-weight:700;color:#1d4ed8">
          ${needsLotNo(it.c1)?l.lotNo||'<span style="color:#d1d5db">미등록</span>':'<span style="color:#e4e9f0">-</span>'}
        </td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:#166534">${fmt(l.inQty||0)}</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:${used>0?'#be185d':'#8492a6'}">${used>0?fmt(used):''}</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:${rem<=0?'#ef4444':'#7e22ce'}">${fmt(rem)}</td>
        <td></td><td></td>
      </tr>`;
    }).join('');

    const txnHtml=txnList.filter(a=>!txnZero.has(a.iid)).map(a=>{
      const stock=getTodayStock(a.iid,today); // 실제 현재고
      const it=ITEMS.find(i=>i.id===a.iid);
      const adjNote=a.adj!==0?`<span style="font-size:10px;padding:1px 5px;background:#fef9c3;color:#a16207;border-radius:4px">조정 ${a.adj>0?'+':''}${fmt(a.adj)}</span>`:'';
      const hasRangeTxn=(a.in+a.out+a.scrap+Math.abs(a.adj))>0;
      return`<tr style="background:#fffef5">
        <td style="text-align:center;color:#8492a6;font-size:11px">누적</td>
        <td>${it?pill(it.c1):''}</td>
        <td style="color:#8492a6;font-size:11px">${it?it.c2:''}</td>
        <td style="color:#8492a6;font-size:11px">${it?it.ut:''}</td>
        <td style="font-weight:600">${iname(a.iid)}</td>
        <td style="text-align:center;font-size:10px;color:#f59e0b">소비기한 미등록</td>
        <td style="text-align:center;color:#d1d5db">-</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:#166534">${hasRangeTxn&&a.in>0?fmt(a.in):''}</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:#be185d">${hasRangeTxn&&(a.out+a.scrap)>0?fmt(a.out+a.scrap):''}</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:${stock<=0?'#ef4444':'#7e22ce'}">${fmt(stock)}</td>
        <td style="color:#8492a6;font-size:11px">${adjNote}</td>
        <td style="color:#8492a6;font-size:11px">${a.mg||''}</td>
      </tr>`;
    }).join('');

    return{html:lotHtml+txnHtml,cnt:lotList.length+txnList.filter(a=>!txnZero.has(a.iid)).length};
  }

  // ── 부자재 행: 재고 있는 품목 전체 표시 ──
  function buildNonLotRows(){
    // 재고 있는 부자재 품목 전체를 기준으로 (거래 없어도 포함)
    const candidateItems=ITEMS.filter(i=>{
      if(LOT_CATS_SET.has(i.c1))return false;
      if(ledgerCatFilter!=='전체'&&i.c1!==ledgerCatFilter)return false;
      if(ledgerFilter.iid&&i.id!==ledgerFilter.iid)return false;
      const stock=getTodayStock(i.id,today);
      return stock>0||todayTxnItems.has(i.id);
    });

    // 날짜 범위 내 거래 집계
    const aggByItem={};
    candidateItems.forEach(i=>{aggByItem[i.id]={iid:i.id,in:0,out:0,scrap:0,adj:0,mg:''};});
    TXN_LOG.filter(t=>{
      if(!aggByItem[t.iid])return false;
      if(ledgerDateFrom&&t.dt<ledgerDateFrom)return false;
      if(ledgerDateTo&&t.dt>ledgerDateTo)return false;
      return true;
    }).forEach(t=>{
      if(t.tp==='입고')     aggByItem[t.iid].in   +=t.qty;
      if(t.tp==='출고')     aggByItem[t.iid].out  +=t.qty;
      if(t.tp==='폐기')     aggByItem[t.iid].scrap+=t.qty;
      if(t.tp==='재고조정') aggByItem[t.iid].adj  +=t.qty;
      if(t.mg) aggByItem[t.iid].mg=t.mg;
    });

    const sortedItems=candidateItems.slice().sort((a,b)=>{
      const c1=(a.c1||'').localeCompare(b.c1||'','ko',{sensitivity:'base'});if(c1!==0)return c1;
      const c2=(a.c2||'').localeCompare(b.c2||'','ko',{sensitivity:'base'});if(c2!==0)return c2;
      return(a.nm||'').localeCompare(b.nm||'','ko',{sensitivity:'base'});
    });

    const html=sortedItems.map(it=>{
      const a=aggByItem[it.id];
      const stock=getTodayStock(it.id,today);
      const hasRangeTxn=(a.in+a.out+a.scrap+Math.abs(a.adj))>0;
      const adjNote=a.adj!==0?`<span style="font-size:10px;padding:1px 5px;background:#fef9c3;color:#a16207;border-radius:4px">조정 ${a.adj>0?'+':''}${fmt(a.adj)}</span>`:'';
      return`<tr>
        <td style="text-align:center;color:#8492a6;font-size:11px">누적</td>
        <td>${pill(it.c1)}</td>
        <td style="color:#8492a6;font-size:11px">${it.c2||''}</td>
        <td style="color:#8492a6;font-size:11px">${it.ut||''}</td>
        <td style="font-weight:600">${it.nm||''}</td>
        <td style="color:#d1d5db;text-align:center">-</td>
        <td style="color:#d1d5db;text-align:center">-</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:#166534">${hasRangeTxn&&a.in>0?fmt(a.in):''}</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:#be185d">${hasRangeTxn&&(a.out+a.scrap)>0?fmt(a.out+a.scrap):''}</td>
        <td style="text-align:right;font-family:'Courier New',monospace;font-weight:700;color:${stock<=0?'#ef4444':'#7e22ce'}">${fmt(stock)}</td>
        <td style="color:#8492a6;font-size:11px">${adjNote}</td>
        <td style="color:#8492a6;font-size:11px">${a.mg||''}</td>
      </tr>`;
    }).join('');
    return{html,cnt:sortedItems.length};
  }

  const showLot   = ledgerCatFilter==='전체'||LOT_CATS_SET.has(ledgerCatFilter);
  const showNonLot= ledgerCatFilter==='전체'||ledgerCatFilter==='부자재';
  const lotResult   = showLot   ? buildLotRows()    : {html:'',cnt:0};
  const nonLotResult= showNonLot? buildNonLotRows() : {html:'',cnt:0};
  const totalCnt=lotResult.cnt+nonLotResult.cnt;
  const allRows=(lotResult.html+nonLotResult.html)||
    `<tr><td colspan="12" style="padding:32px;text-align:center;color:#8492a6">조회된 데이터가 없습니다.</td></tr>`;

  const filteredItems=ledgerCatFilter==='전체'?sortItems(ITEMS):sortItems(ITEMS.filter(i=>i.c1===ledgerCatFilter));
  const itemOpts=filteredItems.map(i=>`<option value="${i.id}" ${ledgerFilter.iid===i.id?'selected':''} >${i.nm}</option>`).join('');

  return`
    <div class="cat-tabs">${catTabs}</div>
    <div class="card" style="padding:13px;margin-bottom:13px">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div class="form-row" style="margin:0"><label>품목</label>
          <select onchange="ledgerFilter.iid=this.value;renderContent()" style="padding:7px 9px;border-radius:6px;border:1px solid #e4e9f0;font-size:12px;min-width:150px">
            <option value="">전체 품목</option>${itemOpts}
          </select>
        </div>
        <div class="form-row" style="margin:0"><label>시작일</label>
          <input type="date" value="${ledgerDateFrom}" onchange="ledgerDateFrom=this.value;renderContent()" style="padding:7px 9px;border-radius:6px;border:1px solid #e4e9f0;font-size:12px">
        </div>
        <div class="form-row" style="margin:0"><label>종료일</label>
          <input type="date" value="${ledgerDateTo}" onchange="ledgerDateTo=this.value;renderContent()" style="padding:7px 9px;border-radius:6px;border:1px solid #e4e9f0;font-size:12px">
        </div>
        <button class="btn btn-blue btn-sm" onclick="renderContent()">조회</button>
        <span style="font-size:12px;color:#8492a6;align-self:flex-end">${totalCnt}건 (소진 제외)</span>
      </div>
    </div>
    <div class="card"><div class="tbl-wrap">
      <table><thead>
        <tr style="background:#f8fafc">
          <th rowspan="2" style="text-align:center;vertical-align:middle;white-space:nowrap;min-width:80px">입고일/일자</th>
          <th rowspan="2" style="text-align:center;vertical-align:middle;min-width:60px">분류1</th>
          <th rowspan="2" style="text-align:center;vertical-align:middle;min-width:70px">분류2</th>
          <th rowspan="2" style="text-align:center;vertical-align:middle;min-width:40px">단위</th>
          <th rowspan="2" style="vertical-align:middle;min-width:150px">제품명</th>
          <th rowspan="2" style="text-align:center;vertical-align:middle;min-width:115px;background:#f5f0ff;color:#7e22ce">소비기한<br><span style="font-size:9px;font-weight:400">(D-일수)</span></th>
          <th rowspan="2" style="text-align:center;vertical-align:middle;min-width:120px;background:#eff6ff;color:#1d4ed8">이력번호<br><span style="font-size:9px;font-weight:400">(원육)</span></th>
          <th colspan="3" style="text-align:center;background:#f0fdf4;color:#166534;border-bottom:1px solid #e4e9f0">수량</th>
          <th rowspan="2" style="vertical-align:middle;min-width:65px">재고조정</th>
          <th rowspan="2" style="vertical-align:middle;min-width:55px">담당자</th>
        </tr>
        <tr style="background:#f8fafc">
          <th style="text-align:right;background:#f0fdf4;color:#166534;min-width:75px">입고</th>
          <th style="text-align:right;background:#fdf2f8;color:#be185d;min-width:75px">출고/사용</th>
          <th style="text-align:right;background:#f5f0ff;color:#7e22ce;min-width:75px">잔여/재고</th>
        </tr>
      </thead><tbody>${allRows}</tbody></table>
    </div></div>
    <div style="font-size:11px;color:#8492a6;margin-top:8px">
      ■ 원자재·원육·제품: Lot 단위 (소비기한별 분리) &nbsp;|&nbsp;
      ■ 부자재: 날짜별 수불 &nbsp;|&nbsp;
      ■ 재고 소진: 오늘 발생 시 당일만 표시, 내일부터 자동 제외
    </div>`;
}

function printLedger(){
  if(!ledgerDateFrom){const n=new Date();ledgerDateFrom=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`;}
  if(!ledgerDateTo) ledgerDateTo=todayStr();

  const LOT_CATS_SET=new Set(['원자재','원육','제품']);
  const today=todayStr();

  // Lot 행
  let lotList=LOTS.filter(l=>{
    const it=ITEMS.find(i=>i.id===l.itemId);
    if(!it)return false;
    if(!LOT_CATS_SET.has(it.c1))return false;
    if(ledgerCatFilter!=='전체'&&it.c1!==ledgerCatFilter)return false;
    if(ledgerFilter.iid&&l.itemId!==ledgerFilter.iid)return false;
    if(ledgerDateTo&&l.inDate>ledgerDateTo)return false;
    if((l.remainQty||0)<=0)return false;
    return true;
  }).sort((a,b)=>{
    const ia=ITEMS.find(i=>i.id===a.itemId)||{};
    const ib=ITEMS.find(i=>i.id===b.itemId)||{};
    const c1=(ia.c1||'').localeCompare(ib.c1||'','ko',{sensitivity:'base'});
    if(c1!==0)return c1;
    return(ia.nm||'').localeCompare(ib.nm||'','ko',{sensitivity:'base'});
  });

  // 부자재 행
  const filtered2=[...TXN_LOG].filter(t=>{
    const it=ITEMS.find(i=>i.id===t.iid);
    if(!it||LOT_CATS_SET.has(it.c1))return false;
    if(ledgerCatFilter!=='전체'&&it.c1!==ledgerCatFilter)return false;
    if(ledgerFilter.iid&&t.iid!==ledgerFilter.iid)return false;
    if(ledgerDateFrom&&t.dt<ledgerDateFrom)return false;
    if(ledgerDateTo&&t.dt>ledgerDateTo)return false;
    return true;
  });
  const aggMap2={};
  filtered2.forEach(t=>{
    const key=`${t.dt}__${t.iid}`;
    if(!aggMap2[key]) aggMap2[key]={dt:t.dt,iid:t.iid,in:0,out:0,scrap:0,adj:0,mg:t.mg||''};
    if(t.tp==='입고')     aggMap2[key].in   +=t.qty;
    if(t.tp==='출고')     aggMap2[key].out  +=t.qty;
    if(t.tp==='폐기')     aggMap2[key].scrap+=t.qty;
    if(t.tp==='재고조정') aggMap2[key].adj  +=t.qty;
    if(t.mg) aggMap2[key].mg=t.mg;
  });
  const balMap2={};
  ITEMS.filter(i=>!LOT_CATS_SET.has(i.c1)).forEach(it=>{balMap2[it.id]=calcStockUpto(it.id,ledgerDateFrom||today)});
  const aggList2=Object.values(aggMap2).sort((a,b)=>a.dt.localeCompare(b.dt)||a.iid.localeCompare(b.iid));
  const finalBal2={...balMap2};
  aggList2.forEach(a=>{finalBal2[a.iid]=(finalBal2[a.iid]||0)+a.in-a.out-a.scrap+a.adj});
  const zeroItems2=new Set(Object.entries(finalBal2).filter(([,v])=>v<=0).map(([k])=>k));

  if(lotList.length===0&&aggList2.filter(a=>!zeroItems2.has(a.iid)).length===0){
    showToast('인쇄할 데이터가 없습니다.','#f59e0b');return;
  }

  const lotRows=lotList.map(l=>{
    const it=ITEMS.find(i=>i.id===l.itemId)||{};
    const usedQty=(l.inQty||0)-(l.remainQty||0);
    const d=expiryDays(l.expiry);
    const dLabel=d===null?'':d<0?'기한초과':`D-${d}`;
    return`<tr>
      <td style="text-align:center">${fmtDate(l.inDate)}</td>
      <td>${it.c1||''}</td><td>${it.c2||''}</td><td>${it.ut||''}</td>
      <td style="font-weight:600">${it.nm||''}</td>
      <td>${fmtDate(l.expiry)}<br><span style="font-size:9px">${dLabel}</span></td>
      <td style="font-family:Courier New,monospace">${needsLotNo(it.c1)?l.lotNo||'-':'-'}</td>
      <td style="text-align:right;font-family:Courier New,monospace;color:#166534">${fmt(l.inQty||0)}</td>
      <td style="text-align:right;font-family:Courier New,monospace;color:#be185d">${usedQty>0?fmt(usedQty):''}</td>
      <td style="text-align:right;font-family:Courier New,monospace;font-weight:700">${fmt(l.remainQty||0)}</td>
      <td></td><td></td>
    </tr>`;
  }).join('');

  const nonLotRows=aggList2.filter(a=>!zeroItems2.has(a.iid)).map(a=>{
    const p=balMap2[a.iid]||0;
    const n=p+a.in-a.out-a.scrap+a.adj;
    balMap2[a.iid]=n;
    const it=ITEMS.find(i=>i.id===a.iid);
    return`<tr>
      <td style="text-align:center">${a.dt}</td>
      <td>${it?it.c1:''}</td><td>${it?it.c2:''}</td><td>${it?it.ut:''}</td>
      <td style="font-weight:600">${iname(a.iid)}</td>
      <td>-</td><td>-</td>
      <td style="text-align:right;font-family:Courier New,monospace;color:#166534">${a.in>0?fmt(a.in):''}</td>
      <td style="text-align:right;font-family:Courier New,monospace;color:#be185d">${a.out>0?fmt(a.out):''}</td>
      <td style="text-align:right;font-family:Courier New,monospace;font-weight:700;color:${n<=0?'#dc2626':'#1e293b'}">${fmt(n)}</td>
      <td style="font-size:10px">${a.adj!==0?`조정 ${a.adj>0?'+':''}${fmt(a.adj)}`:''}</td>
      <td style="font-size:10px">${a.mg||''}</td>
    </tr>`;
  }).join('');

  const nowStr=new Date().toLocaleString('ko-KR');
  const catLabel=ledgerCatFilter;
  const itemLabel=ledgerFilter.iid?(ITEMS.find(i=>i.id===ledgerFilter.iid)?.nm||''):'전체';
  const totalCnt=lotList.length+aggList2.filter(a=>!zeroItems2.has(a.iid)).length;

  const printContent=`
    <style>
      @page{margin:8mm 10mm;size:A4 landscape}
      body{font-family:'Malgun Gothic',sans-serif;font-size:10px;color:#1e293b}
      table{width:100%;border-collapse:collapse;page-break-inside:auto}
      thead{display:table-header-group}
      tr{page-break-inside:avoid}
      th{padding:5px 7px;background:#1e2535;color:#fff;font-size:10px;font-weight:600;text-align:left;border:1px solid #334155}
      td{padding:4px 7px;border:1px solid #e4e9f0;font-size:10px}
      tr:nth-child(even) td{background:#f8fafc}
      .hd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1e2535;padding-bottom:6px;margin-bottom:10px}
      .hd .co{font-size:13px;font-weight:700}

async function approveUser(uid){
  const u=USERS.find(u=>u.id===uid);if(!u)return;
  const sel=document.getElementById('role-sel-'+uid);
  const role=sel?sel.value:'user';
  try {
    await window.fbUpdateDoc(window.fbDoc(window.db, "users", u._docId), { status: 'active', role: role, approvedAt: todayStr() });
    u.status='active'; u.role=role; u.approvedAt=todayStr();
    renderContent(); showToast(`${u.name}님을 ${ROLE_LABEL[role]}으로 승인했습니다.`);
  } catch(e){ console.error(e); alert("승인 오류"); }
}
async function rejectUser(uid){
  const u=USERS.find(u=>u.id===uid);if(!u)return;
  if(!confirm(`${u.name}(${u.id}) 가입 신청을 거부하시겠습니까?`))return;
  try {
    await window.fbUpdateDoc(window.fbDoc(window.db, "users", u._docId), { status: 'rejected' });
    u.status='rejected'; renderContent(); showToast(`${u.name}님 가입 거부`,'#ef4444');
  } catch(e){}
}
async function resignUser(uid){
  const u=USERS.find(u=>u.id===uid);if(!u)return;
  if(!confirm(`${u.name}님을 퇴사 처리하시겠습니까?\n이후 해당 계정으로 로그인이 불가능합니다.`))return;
  try {
    await window.fbUpdateDoc(window.fbDoc(window.db, "users", u._docId), { status: 'resigned', resignedAt: todayStr() });
    u.status='resigned'; u.resignedAt=todayStr(); renderContent(); showToast(`${u.name}님 퇴사 처리`,'#f59e0b');
  } catch(e){}
}
async function deleteUser(uid){
  const u=USERS.find(u=>u.id===uid);if(!u)return;
  if(!confirm(`${u.name}(${u.id}) 계정을 완전히 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;
  try {
    await window.fbDeleteDoc(window.fbDoc(window.db, "users", u._docId));
    USERS=USERS.filter(u=>u.id!==uid); renderContent(); showToast(`${u.name} 계정 삭제`,'#ef4444');
  } catch(e){}
}
async function setUserRole(uid,role){
  const u=USERS.find(u=>u.id===uid);if(!u)return;
  try {
    await window.fbUpdateDoc(window.fbDoc(window.db, "users", u._docId), { role: role });
    u.role=role; renderContent(); showToast(`${u.name}님을 ${ROLE_LABEL[role]}으로 변경`);
  } catch(e){}
}
async function transferMaster(){
  const tid=document.getElementById('transfer-target').value;
  const pw=document.getElementById('transfer-pw').value;
  if(!tid){showToast('양도 대상을 선택해주세요.','#f59e0b');return}
  if(pw!==curUser.pw){showToast('비밀번호가 올바르지 않습니다.','#ef4444');return}
  if(!confirm('정말로 마스터 권한을 양도하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  const target=USERS.find(u=>u.id===tid);if(!target)return;
  
  try {
    const batch = window.fbWriteBatch(window.db);
    batch.update(window.fbDoc(window.db, "users", curUser._docId), { role: 'admin' });
    batch.update(window.fbDoc(window.db, "users", target._docId), { role: 'master' });
    await batch.commit();
    
    USERS.find(u=>u.id===curUser.id).role='admin';
    target.role='master';
    curUser=USERS.find(u=>u.id===curUser.id);
    renderSidebarUser();initNav();renderContent();
    showToast(`${target.name}님에게 마스터 권한 양도 완료`);
  } catch(e) { console.error(e); alert("권한 양도 실패"); }
}

function renderInbound(){
  const IB_CATS=['전체','원자재','부자재','원육','제품'];

  // 탭별 카운트
  const catCounts={};
  IB_CATS.forEach(c=>{
    catCounts[c]=c==='전체'
      ? inboundRows.length
      : inboundRows.filter(r=>{const it=ITEMS.find(i=>i.id===r.itemId);return it&&it.c1===c;}).length;
  });

  const catTabs=IB_CATS.map(c=>`
    <button class="cat-tab${c===inboundCatFilter?' sel-'+(c==='전체'?'all':c):''}"
      onclick="inboundCatFilter='${c}';renderContent()"
      style="${c===inboundCatFilter&&c==='전체'?'background:#1e2535;color:#fff;border-color:#1e2535':''}">
      ${c} <span style="font-size:10px;opacity:.75">(${catCounts[c]})</span></button>`).join('');

  // 현재 탭 기준 필터 + 분류1→제품명 정렬
  const filtered=inboundCatFilter==='전체'
    ? inboundRows
    : inboundRows.filter(r=>{const it=ITEMS.find(i=>i.id===r.itemId);return it&&it.c1===inboundCatFilter;});
  const rows=[...filtered].sort((a,b)=>{
    const ia=ITEMS.find(i=>i.id===a.itemId)||{};
    const ib=ITEMS.find(i=>i.id===b.itemId)||{};
    const c1=(ia.c1||'').localeCompare(ib.c1||'','ko',{sensitivity:'base'});
    if(c1!==0)return c1;
    return (ia.nm||'').localeCompare(ib.nm||'','ko',{sensitivity:'base'});
  });

  const thead=`<thead><tr style="background:#f8fafc">
    <th style="min-width:85px">품목코드</th>
    <th style="min-width:65px">분류1</th>
    <th style="min-width:75px">분류2</th>
    <th style="min-width:160px">제품명</th>
    <th style="min-width:90px">규격</th>
    <th style="min-width:45px">단위</th>
    <th style="min-width:90px">거래처</th>
    <th style="min-width:130px;background:#f5f0ff;color:#7e22ce">소비기한</th>
    <th style="min-width:145px;background:#eff6ff;color:#1d4ed8">이력번호</th>
    <th style="min-width:110px;background:#f0fdf4;color:#166534">입고수량</th>
    <th style="min-width:70px"></th>
  </tr></thead>`;

  const tbody=rows.length===0
    ?`<tbody><tr><td colspan="11" style="padding:40px;text-align:center;color:#8492a6">
        ${inboundRows.length===0
          ? '[+ 품목 추가] 버튼을 클릭하거나 날짜를 선택해 기존 입고 데이터를 불러오세요.'
          : `[${inboundCatFilter}] 분류에 해당하는 입고 품목이 없습니다.`}
      </td></tr></tbody>`
    :`<tbody>${rows.map(r=>{
      const it=ITEMS.find(i=>i.id===r.itemId)||{};
      const hasExp = needsLot(it.c1);     // 원자재·원육·제품
      const hasLno = needsLotNo(it.c1);   // 원육만
      const canAdd = hasExp || hasLno;

      // 소비기한 셀: lot 대상만 활성
      const expiryTd = hasExp
        ?`<td style="padding:5px 8px;background:#fdf4ff">
            <input type="date" value="${r.expiry||''}"
              style="width:100%;padding:4px 6px;border:1px solid #d8b4fe;border-radius:5px;font-size:12px;color:#7e22ce;background:#fdf4ff"
              onchange="updateInboundRow('${r._rowId}','expiry',this.value)">
          </td>`
        :`<td style="background:#fafafa;text-align:center;color:#d1d5db;font-size:11px">-</td>`;

      // 이력번호 셀: 원육만 활성
      const lotNoTd = hasLno
        ?`<td style="padding:5px 8px;background:#eff6ff">
            <input type="text" maxlength="12" value="${r.lotNo||''}" placeholder="12자리 숫자"
              style="width:100%;padding:4px 6px;border:1px solid #bfdbfe;border-radius:5px;font-size:12px;font-family:'Courier New',monospace;color:#1d4ed8;background:#eff6ff"
              onchange="updateInboundRow('${r._rowId}','lotNo',this.value)">
          </td>`
        :`<td style="background:#fafafa;text-align:center;color:#d1d5db;font-size:11px">-</td>`;

      return`<tr id="ibrow-${r._rowId}" style="border-bottom:1px solid #f1f5f9">
        <td style="padding:8px 10px"><span class="td-code">${it.id||''}</span></td>
        <td style="padding:8px 10px">${it.c1?pill(it.c1):''}</td>

// 날짜 변경 시 해당 날짜의 기존 입고 데이터 불러오기
function changeInboundDate(date){
  inboundDate=date;
  loadInboundByDate(date);
}

function loadInboundByDate(date){
  // 해당 날짜의 입고 txn 조회
  const dayTxns=TXN_LOG.filter(t=>t.dt===date&&t.tp==='입고');
  if(dayTxns.length===0){
    // 데이터 없으면 초기화
    inboundRows=[];
    renderContent();
    return;
  }

  // 해당 날짜의 lot 조회
  const dayLots=LOTS.filter(l=>l.inDate===date);

  const newRows=[];
  dayTxns.forEach(t=>{
    const itemLots=dayLots.filter(l=>l.itemId===t.iid);
    if(itemLots.length>0){
      // lot 있는 경우 → lot별 행 생성
      itemLots.forEach(l=>{
        newRows.push({
          itemId:t.iid,
          expiry:l.expiry||'',
          lotNo:l.lotNo||'',
          qty:l.inQty||0,
          _rowId:`ibr-loaded-${l._docId||Date.now()}-${Math.random().toString(36).slice(2,5)}`,
          _lotDocId:l._docId||null
        });
      });
    } else {
      // lot 없는 경우 → txn qty로 행 1개 생성
      newRows.push({
        itemId:t.iid,
        expiry:'',
        lotNo:'',
        qty:t.qty||0,
        _rowId:`ibr-loaded-${t._docId||Date.now()}-${Math.random().toString(36).slice(2,5)}`,
        _lotDocId:null
      });
    }
  });

  inboundRows=newRows;
  renderContent();
  showToast(`${date} 입고 데이터 ${newRows.length}건 불러왔습니다.`,'#3b7bff');
}

function updateInboundRow(rowId,field,value){
  const r=inboundRows.find(r=>r._rowId===rowId);
  if(r) r[field]=field==='qty'?Number(value)||0:value;
}

function addInboundRowSameItem(itemId,afterRowId){
  const it=ITEMS.find(i=>i.id===itemId);
  const newRow={itemId,expiry:'',lotNo:'',qty:0,_rowId:`ibr-${Date.now()}-${Math.random().toString(36).slice(2,6)}`};
  const idx=inboundRows.findIndex(r=>r._rowId===afterRowId);
  if(idx>=0) inboundRows.splice(idx+1,0,newRow);
  else inboundRows.push(newRow);
  renderContent();
}

function removeInboundRow(rowId){
  inboundRows=inboundRows.filter(r=>r._rowId!==rowId);
  renderContent();
}

async function saveInbound(){
  if(!canEdit()){showToast('편집 권한이 없습니다.','#ef4444');return}

  // ① DOM에서 최신 입력값 직접 읽어 inboundRows 동기화
  inboundRows.forEach(r=>{
    const qtyEl = document.querySelector(`#ibrow-${r._rowId} input[type="number"]`);
    const expEl = document.querySelector(`#ibrow-${r._rowId} input[type="date"]`);
    const lotEl = document.querySelector(`#ibrow-${r._rowId} input[type="text"]`);
    if(qtyEl) r.qty    = Number(qtyEl.value)||0;
    if(expEl) r.expiry = expEl.value||'';
    if(lotEl) r.lotNo  = lotEl.value||'';
  });

  const validRows=inboundRows.filter(r=>r.qty>0);
  if(validRows.length===0){showToast('입고 수량을 입력해주세요.','#f59e0b');return}

  // 원육은 이력번호 필수 체크
  for(const r of validRows){
    const it=ITEMS.find(i=>i.id===r.itemId);
    if(!it)continue;
    if(needsLotNo(it.c1)&&(!r.lotNo||!/^\d{12}$/.test(r.lotNo))){
      showToast(`[${it.nm}] 이력번호는 12자리 숫자여야 합니다.`,'#ef4444');return;
    }
  }

  const date=inboundDate;
  const batch=window.fbWriteBatch(window.db);

  // ② 품목별 수량 합산
  const byItem={};
  validRows.forEach(r=>{
    if(!byItem[r.itemId]) byItem[r.itemId]=0;
    byItem[r.itemId]+=r.qty;
  });

  for(const [itemId,totalQty] of Object.entries(byItem)){
    const it=ITEMS.find(i=>i.id===itemId);
    if(!it)continue;

    // ③ 기존 입고 txn 삭제 (중복 방지)
    const existing=TXN_LOG.filter(t=>t.dt===date&&t.iid===itemId&&t.tp==='입고');
    existing.forEach(t=>{if(t._docId)batch.delete(window.fbDoc(window.db,'txns',t._docId))});
    TXN_LOG=TXN_LOG.filter(t=>!(t.dt===date&&t.iid===itemId&&t.tp==='입고'));

    // TXN_SHEET 업데이트
    if(!TXN_SHEET[date])TXN_SHEET[date]={};
    if(!TXN_SHEET[date][itemId])TXN_SHEET[date][itemId]={};
    TXN_SHEET[date][itemId].in=totalQty;

    // ④ 새 txn 레코드 생성
    const log={dt:date,tp:'입고',iid:itemId,qty:totalQty,nt:'입고관리',mg:curUser.name,id:`T-${Date.now()}-${itemId}-in`};
    const newRef=window.fbDoc(window.fbCollection(window.db,'txns'));
    batch.set(newRef,log);
    log._docId=newRef.id;
    TXN_LOG.push(log);

    // ⑤ Lot 생성 (소비기한 있는 카테고리)
    if(needsLot(it.c1)){
      // 기존 lot 중 오늘 날짜+품목 lot 삭제 후 재생성 (중복 방지)
      const existingLots=LOTS.filter(l=>l.itemId===itemId&&l.inDate===date);
      existingLots.forEach(l=>{if(l._docId)batch.delete(window.fbDoc(window.db,'lots',l._docId))});
      LOTS=LOTS.filter(l=>!(l.itemId===itemId&&l.inDate===date));

      const rows4item=validRows.filter(r=>r.itemId===itemId);
      rows4item.forEach(r=>{
        if(!r.expiry&&!r.lotNo)return;
        const newLot={
          itemId, lotNo:r.lotNo||'', expiry:r.expiry||'',
          inQty:r.qty, remainQty:r.qty, inDate:date, status:'active'
        };
        const lotRef=window.fbDoc(window.fbCollection(window.db,'lots'));
        batch.set(lotRef,newLot);
        newLot._docId=lotRef.id;
        LOTS.push(newLot);
      });
    }
  }

  try{
    await batch.commit();
    rebuildCaches(); // TXN_LOG 변경 → PREV_STOCK_SNAP·TXN_SHEET 재구성
    showToast(`${Object.keys(byItem).length}개 품목 입고 저장 완료!`,'#10b981');
    inboundRows=[];
    renderContent();
  }catch(e){
    console.error('saveInbound error:',e);
    alert(`입고 저장 실패: ${e.message||e}`);
  }
}

function renderContent(){
  const el=document.getElementById('content');
  switch(curMenu){
    case 'dashboard': el.innerHTML=renderDashboard();break;
    case 'items':     el.innerHTML=renderItems();break;
    case 'inbound':   el.innerHTML=renderInbound();break;
    case 'txn':       el.innerHTML=renderTxn();break;
    case 'inventory': el.innerHTML=renderInventory();break;
    case 'ledger':    el.innerHTML=renderLedger();break;
    case 'users':     el.innerHTML=renderUsers();break;
    default:          el.innerHTML='';
  }
}

async function saveItem() {
  const id = document.getElementById('it-id').value.trim();
  const nm = document.getElementById('it-nm').value.trim();
  if(!id || !nm) { alert('품목코드와 제품명을 입력하세요.'); return; }
  if(ITEMS.find(i => i.id === id)) { alert('이미 존재하는 품목코드입니다.'); return; }

  const newItem = {
    id: id, nm: nm, on: true, c1: document.getElementById('it-c1').value, c2: document.getElementById('it-c2').value,
    sp: document.getElementById('it-sp').value, ut: document.getElementById('it-ut').value || 'EA',
    su: document.getElementById('it-su').value, safetyStock: Number(document.getElementById('it-ss').value) || 0
  };

  try {
    const docRef = await window.fbAddDoc(window.fbCollection(window.db, "items"), newItem);
    ITEMS.push({ ...newItem, _docId: docRef.id });
    closeModal();
    renderContent();
    showToast('파이어베이스에 품목이 저장되었습니다!', '#3b7bff');
  } catch (error) { console.error("에러 발생: ", error); alert("저장 실패!"); }
}
