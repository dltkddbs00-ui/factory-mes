      </div>`).join('');
    const rRows=fields.map(f=>{
      const m=Object.entries(excelMapping).find(([,v])=>v===f.k);
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:5px;background:${m?'#f0fdf4':f.req?'#fef2f2':'#f8fafc'};border:1px solid ${m?'#bbf7d0':f.req?'#fecaca':'#e4e9f0'}">
        <span style="font-size:12px">${f.l}${f.req?'<span style="color:#ef4444"> *</span>':''}</span>
        <span style="font-size:11px;font-weight:600;color:${m?'#10b981':f.req?'#ef4444':'#8492a6'}">${m?'✓ '+m[0]:f.req?'필수':'선택'}</span>
      </div>`;}).join('');
    body=`
      <p style="font-size:12px;color:#8492a6;margin-bottom:13px">컬럼 <strong style="color:#111">${excelHeaders.length}개 / ${excelRows.length}행</strong> 감지.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><p style="font-size:10px;font-weight:600;color:#8492a6;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">엑셀 컬럼 → 시스템 필드</p>${lRows}</div>
        <div><p style="font-size:10px;font-weight:600;color:#8492a6;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">매핑 상태</p>${rRows}</div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-white" onclick="excelStep=1;renderExcelModal()">← 다시 업로드</button>
        <button class="btn btn-blue" onclick="buildParsed()">다음 →</button>
      </div>`;
  }
  if(excelStep===3){
    const okN=excelParsed.filter(i=>i._ok).length,errN=excelParsed.filter(i=>!i._ok).length;
    const rows=excelParsed.map(it=>`<tr style="background:${it._ok?'':'#fff8f8'}">
      <td style="font-size:11px;color:#8492a6">${it._row}</td>
      <td style="font-family:'Courier New',monospace;font-size:11px">${it.id||''}</td>
      <td>${it.c1?pill(it.c1):''}</td>
      <td style="color:#8492a6;font-size:11px">${it.c2||''}</td>
      <td style="font-weight:500">${it.nm||''}</td>
      <td style="color:#8492a6;font-size:11px">${it.sp||''}</td>
      <td>${it.ut||''}</td>
      <td>${it._ok?'<span class="pill" style="background:#dcfce7;color:#166534">✓ 정상</span>':`<span class="pill" style="background:#fef2f2;color:#dc2626">${it._err}</span>`}</td>
    </tr>`).join('');
    body=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
        <p style="font-size:12px;color:#8492a6">등록 전 최종 확인</p>
        <div style="display:flex;gap:7px">
          <span class="pill" style="background:#f0fdf4;color:#10b981">✓ ${okN}건</span>
          ${errN>0?`<span class="pill" style="background:#fef2f2;color:#dc2626">⚠ ${errN}건</span>`:''}
        </div>
      </div>
      <div style="border:1px solid #e4e9f0;border-radius:8px;overflow:auto;max-height:240px;margin-bottom:13px">
        <table style="font-size:12px"><thead style="position:sticky;top:0;background:#f8fafc"><tr>
          <th>행</th><th>코드</th><th>분류1</th><th>분류2</th><th>제품명</th><th>규격</th><th>단위</th><th>검증</th>
        </tr></thead><tbody>${rows}</tbody></table>
      </div>
      ${errN>0?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:9px 13px;margin-bottom:13px;font-size:12px;color:#b91c1c">오류 ${errN}건 제외, 정상 ${okN}건만 등록됩니다.</div>`:''}
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-white" onclick="excelStep=2;renderExcelModal()">← 수정</button>
        <button class="btn btn-blue" ${okN===0?'disabled style="opacity:.5"':''} id="btn-import" onclick="doImport()">품목 ${okN}건 일괄 등록</button>
      </div>`;
  }
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal-box wide">
        <div class="modal-head"><h3>엑셀 일괄 등록 — 위하고 연동</h3><button class="close" onclick="closeModal()">×</button></div>
        <div class="modal-body"><div class="step-bar">${stepBar}</div>${body}</div>
      </div>
    </div>`;
}
function handleFileDrop(e){const f=e.dataTransfer.files[0];if(f)readExcel(f)}
function handleFileInput(i){const f=i.files[0];if(f)readExcel(f)}
function readExcel(file){
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(data.length<2){alert('데이터가 없습니다.');return}
    excelHeaders=data[0].map(h=>String(h).trim());
    excelRows=data.slice(1).filter(r=>r.some(c=>c!==''));
    excelMapping={};excelHeaders.forEach(h=>{const f=EXCEL_MAP[h];if(f)excelMapping[h]=f});
    excelStep=2;renderExcelModal();
  };r.readAsArrayBuffer(file);
}
function buildParsed(){
  if(!Object.values(excelMapping).includes('id')||!Object.values(excelMapping).includes('nm')){alert('품목코드와 제품명을 매핑하세요.');return}
  const exist=ITEMS.map(i=>i.id);
  excelParsed=excelRows.map((row,i)=>{
    const obj={};
    excelHeaders.forEach((h,j)=>{const f=excelMapping[h];if(f)obj[f]=String(row[j]).trim()});
    const errs=[];
    if(!obj.id)errs.push('코드없음');if(!obj.nm)errs.push('제품명없음');if(exist.includes(obj.id))errs.push('중복');
    return{...obj,on:true,safetyStock:0,_row:i+2,_ok:errs.length===0,_err:errs.join(', ')};
  });excelStep=3;renderExcelModal();
}

// 🔥 엑셀 데이터 파이어베이스에 일괄 저장
async function doImport(){
  const toAdd = excelParsed.filter(i=>i._ok);
  document.getElementById('btn-import').textContent = "저장 중...";
  document.getElementById('btn-import').disabled = true;
  
  try {
    const batch = window.fbWriteBatch(window.db);
    toAdd.forEach(it => {
      const newRef = window.fbDoc(window.fbCollection(window.db, "items"));
      const finalItem = {
        id: it.id, nm: it.nm, on: true, c1: it.c1||'', c2: it.c2||'', 
        sp: it.sp||'', ut: it.ut||'EA', su: it.su||'', safetyStock: 0
      };
      batch.set(newRef, finalItem);
    });
    
    await batch.commit(); // DB로 한 번에 전송!
    
    await loadItemsFromDB(); // 메모리 최신화
    closeModal();
    showToast(`품목 ${toAdd.length}건이 성공적으로 등록되었습니다!`);
  } catch(e) {
    console.error(e); alert("엑셀 일괄 등록 실패");
  }
}

/* ══════════════════════════════
   파이어베이스 데이터 불러오기 (초기화)
══════════════════════════════ */
// 1. 사용자 정보 불러오기 (최초 1회 마스터 계정 자동생성 기능 포함)
async function loadUsersFromDB() {
  try {
    const querySnapshot = await window.fbGetDocs(window.fbCollection(window.db, "users"));
    USERS = []; 
    querySnapshot.forEach((doc) => { USERS.push({ ...doc.data(), _docId: doc.id }); });
    
    // 만약 DB가 텅 비어있다면, 기본 마스터 계정을 생성해 줍니다.
    if(USERS.length === 0) {
      const defaultMaster = {
        id:'master', pw:'master123', name:'마스터관리자', phone:'010-0000-0000', dept:'경영진',
        role:'master', status:'active', joinedAt:todayStr(), approvedAt:todayStr()
      };
      const docRef = await window.fbAddDoc(window.fbCollection(window.db, "users"), defaultMaster);
      USERS.push({ ...defaultMaster, _docId: docRef.id });
      console.log("🔥 최초 마스터 계정 자동 생성 완료");
    }
  } catch (error) { console.error("사용자 불러오기 에러: ", error); }
}

// 2. 품목 데이터 불러오기
async function loadItemsFromDB() {
  try {
    const querySnapshot = await window.fbGetDocs(window.fbCollection(window.db, "items"));
    ITEMS = []; 
    querySnapshot.forEach((doc) => { ITEMS.push({ ...doc.data(), _docId: doc.id }); });
    if (curUser) renderContent();
  } catch (error) { console.error("품목 불러오기 에러: ", error); }
}

// 3. 입출고(수불) 내역 불러오기
async function loadTxnsFromDB() {
  try {
    const querySnapshot = await window.fbGetDocs(window.fbCollection(window.db, "txns"));
    TXN_LOG = [];
    TXN_SHEET = {}; 
    
    querySnapshot.forEach((doc) => {
      TXN_LOG.push({ ...doc.data(), _docId: doc.id });
    });
    
    // 날짜 순서대로 정렬
    TXN_LOG.sort((a,b) => a.dt.localeCompare(b.dt));

    // 화면(TXN_SHEET) 복구하기
    TXN_LOG.forEach(log => {
      if(!TXN_SHEET[log.dt]) TXN_SHEET[log.dt] = {};
      if(!TXN_SHEET[log.dt][log.iid]) TXN_SHEET[log.dt][log.iid] = {};
      
      if(log.tp === '입고') TXN_SHEET[log.dt][log.iid].in = (TXN_SHEET[log.dt][log.iid].in || 0) + log.qty;
      if(log.tp === '출고') TXN_SHEET[log.dt][log.iid].out = (TXN_SHEET[log.dt][log.iid].out || 0) + log.qty;
      if(log.tp === '폐기') TXN_SHEET[log.dt][log.iid].scrap = (TXN_SHEET[log.dt][log.iid].scrap || 0) + log.qty;
      if(log.tp === '재고조정') TXN_SHEET[log.dt][log.iid].adj = (TXN_SHEET[log.dt][log.iid].adj || 0) + log.qty;
    });

    if (curUser) renderContent();
  } catch (error) { console.error("입출고 불러오기 에러: ", error); }
}

// 4. 묶음(Lot) 데이터 불러오기
async function loadLotsFromDB(){
  try{
    const qs=await window.fbGetDocs(window.fbCollection(window.db,'lots'));
    LOTS=[];
    qs.forEach(doc=>{ LOTS.push({...doc.data(),_docId:doc.id}); });
    console.log(`🏷 묶음(Lot) ${LOTS.length}건 로드 완료`);
  }catch(e){console.error('묶음 불러오기 에러:',e);}
}

/* ══════════════════════════════
   앱 최초 실행 (비동기 부팅)
══════════════════════════════ */
window.bootApp = async function() {
  await loadUsersFromDB();
  await loadItemsFromDB();
  await loadTxnsFromDB();
  await loadLotsFromDB();
  snapPrevStock(todayStr());
  schedMidnightSnap();
  console.log("🚀 시스템 부팅 완료! 모든 데이터 연동 정상 작동 중.");
};
